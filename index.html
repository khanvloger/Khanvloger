<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VlogerKhan</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle, #0f0f0f, #000);
  color:white;
  text-align:center;
}

/* Profile */
.profile img {
  width:130px;
  height:130px;
  border-radius:50%;
  border:4px solid red;
  margin-top:40px;
  box-shadow:0 0 30px red;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { box-shadow:0 0 10px red; }
  to { box-shadow:0 0 40px red; }
}

h1 {
  font-size:32px;
  margin:10px 0;
}

p {
  color:#ccc;
}

/* Buttons */
.btn {
  display:block;
  margin:15px auto;
  padding:15px;
  width:80%;
  max-width:300px;
  border-radius:50px;
  text-decoration:none;
  color:white;
  font-size:18px;
  background: linear-gradient(45deg, red, #ff4d4d);
  box-shadow:0 0 20px red;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.05);
  box-shadow:0 0 30px red;
}

/* Video */
.video {
  margin-top:30px;
}

iframe {
  width:90%;
  height:200px;
  border-radius:15px;
  border:none;
  box-shadow:0 0 20px #ff0000;
}

/* Footer */
.footer {
  margin-top:30px;
  padding:10px;
  font-size:14px;
  color:#777;
}
</style>
</head>

<body>

<div class="profile">
  <img src="https://i.imgur.com/6VBx3io.png">
  <h1>VlogerKhan</h1>
  <p>Daily Lifestyle Vlogs</p>
</div>

<a class="btn" href="https://www.youtube.com/@khanvloger" target="_blank">▶ YouTube Channel</a>
<a class="btn" href="https://instagram.com/@vlogerkhan target 📸 Instagram</a>
<a class="btn" href="https://facebook.com/VlogerKhan" target="_blank">📘 Facebook Page</a>

<div class="video">
  <h2>🔥 Latest Video</h2>

  <iframe src="https://www.youtube.com/embed/8w8TfJadTQw"
  allowfullscreen></iframe>
</div>

<div class="footer">
  © 2026 VlogerKhan | Made with ❤️
</div>

</body>
</html>
