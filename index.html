
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KhanVloger</title>

<link rel="manifest" href="manifest.json">

<style>
body {margin:0; font-family:sans-serif; background:#000; color:#fff;}
header {text-align:center; padding:10px; background:#111;}

.logo {
  width:90px;
  border-radius:50%;
  border:3px solid red;
}

.title {
  color:#ffcc00;
  font-size:22px;
  margin-top:5px;
}

.tabs {

}

  flex:1;
  padding:12px;
  background:none;
  border:none;
  color:white;
  font-size:14px;
}

/* Sections */
.section {display:none; padding:10px;}
.active {display:block;}

iframe {
  width:100%;
  border-radius:10px;
}

/* Reels */
.reel {
  height:300px;
  margin:10px 0;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
}

/* Social */
.social a {
  display:inline-block;
  margin:5px;
  padding:8px 15px;
  border-radius:20px;
  text-decoration:none;
  color:white;
}
.insta {background:#e1306c;}
.fb {background:#1877f2;}

/* Install button */
.install-btn {
  position:fixed;
  bottom:80px;
  right:15px;
  background:red;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<img src="logo.png" class="logo">

<div class="tabs">

<iframe height="200"

<div id="reels" class="section">

</div>

<!-- CONTACT -->
<div id="contact" class="section">
<h3>Follow Me</h3>

<div class="social">
<a href="https://instagram.com/VlogerKhan" class="insta">📸 Instagram</a>
<a href="https://facebook.com/VlogerKhan" class="fb">📘 Facebook</a>
</div>

</div>

<!-- Install Button -->
<div class="install-btn" id="installBtn">📲 Install App</div>
