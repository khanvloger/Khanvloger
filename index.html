<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VlogerKhan</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle, #0f0f0f, #000);
  color:white;
  text-align:center;
}

/* Loader */
#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  color:red;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
  z-index:9999;
}

/* Profile */
.profile img {
  width:130px;
  height:130px;
  border-radius:50%;
  border:4px solid red;
  margin-top:40px;
  box-shadow:0 0 30px red;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { box-shadow:0 0 10px red; }
  to { box-shadow:0 0 40px red; }
}

h1 { margin:10px; }
p { color:#aaa; }

/* Buttons */
.btn {
  display:block;
  margin:15px auto;
  padding:15px;
  width:80%;
  max-width:320px;
  border-radius:50px;
  text-decoration:none;
  color:white;
  font-size:18px;
  background: linear-gradient(45deg, red, #ff4d4d);
  box-shadow:0 0 20px red;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.1);
}

/* Video */
iframe {
  width:90%;
  height:220px;
  border:none;
  border-radius:15px;
  box-shadow:0 0 20px red;
}

/* Counter */
.counter {
  margin-top:20px;
  font-size:18px;
  color:#0f0;
}

/* Popup */
.popup {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 15px red;
  display:none;
}
</style>
</head>

<body>

<div id="loader">Loading VlogerKhan...</div>

<div class="profile">
  <img src="https://i.imgur.com/6VBx3io.png">
  <h1>VlogerKhan</h1>
  <p>Daily Lifestyle Vlogs</p>
</div>

<a class="btn" href="https://www.youtube.com/@khanvloger" target="_blank">▶ YouTube Channel</a>
<a class="btn" href="https://instagram.com/@VlogerKhan ="_blank">📸 Instagram</a>
<a class="btn" href="https://facebook.com/VlogerKhan" target="_blank">📘 Facebook Page</a>

<h2>🔥 Latest Video</h2>

<!-- AUTO VIDEO -->
<iframe src="https://www.youtube.com/embed?listType=user_uploads&list=khanvloger"></iframe>

<!-- Visitor Counter -->
<div class="counter">
👀 Visitors: <span id="count">0</span>
</div>

<!-- Popup -->
<div class="popup" id="popup">
🔥 Subscribe to VlogerKhan!
</div>

<script>
// Loader
window.onload = function(){
  document.getElementById("loader").style.display = "none";
}

// Visitor Counter
let count = localStorage.getItem("visits") || 0;
count++;
localStorage.setItem("visits", count);
document.getElementById("count").innerText = count;

// Popup
setTimeout(()=>{
  document.getElementById("popup").style.display="block";
},3000);
</script>

</body>
</html>
